<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Pink Launch Countdown | Coming Soon</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
      /* Dreamy pink gradient background */
      background: linear-gradient(145deg, #2d0b1f 0%, #1f0a1a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1rem;
      position: relative;
      color: #ffe0f0;
    }

    /* ========= COUNTDOWN LAYER (visible until launch) ========= */
    .countdown-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 40%, #2a0a1c, #0f0410);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(2px);
      transition: opacity 0.6s ease;
      padding: 1rem;
    }

    .countdown-card {
      max-width: 700px;
      width: 100%;
      background: rgba(40, 12, 26, 0.85);
      backdrop-filter: blur(16px);
      border-radius: 2rem;
      padding: 2rem 1.5rem;
      text-align: center;
      border: 1px solid rgba(255, 105, 180, 0.7);
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 105, 180, 0.3) inset;
      animation: floatGlowPink 2s infinite alternate;
    }

    @keyframes floatGlowPink {
      0% {
        box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 105, 180, 0.3) inset;
        transform: translateY(0px);
      }
      100% {
        box-shadow: 0 40px 60px rgba(0, 0, 0, 0.6), 0 0 0 3px rgba(255, 105, 180, 0.7) inset;
        transform: translateY(-6px);
      }
    }

    .countdown-title {
      font-size: clamp(1.5rem, 6vw, 2.2rem);
      font-weight: 600;
      margin-bottom: 0.5rem;
      letter-spacing: -0.3px;
      color: #ffc0e0;
      text-shadow: 0 0 5px rgba(255, 105, 180, 0.5);
    }

    .countdown-sub {
      font-size: 0.9rem;
      color: #ffa5ce;
      margin-bottom: 1.8rem;
      border-bottom: 1px dashed #ff4d94;
      display: inline-block;
      padding-bottom: 6px;
    }

    .timer-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin: 1.8rem 0 1.2rem;
    }

    .time-block {
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(4px);
      padding: 0.8rem 0.4rem;
      min-width: 75px;
      border-radius: 1.5rem;
      border: 1px solid #ff66aa;
      box-shadow: 0 4px 12px rgba(255, 80, 140, 0.2);
      flex: 0 1 auto;
    }

    .time-number {
      font-size: clamp(2rem, 7vw, 3.8rem);
      font-weight: 800;
      font-family: 'Courier New', 'Fira Mono', monospace;
      background: linear-gradient(145deg, #fff0fb, #ff99cc);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      line-height: 1;
      letter-spacing: 2px;
    }

    .time-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 500;
      color: #ffb8dc;
      margin-top: 6px;
    }

    .countdown-message {
      margin-top: 1.5rem;
      font-size: 0.9rem;
      background: #3b1028c9;
      display: inline-block;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      backdrop-filter: blur(2px);
      color: #ffbfe5;
      font-weight: 500;
    }

    .launch-note {
      font-size: 0.75rem;
      margin-top: 1.2rem;
      color: #e68ab3;
    }

    /* Loader / redirect message (brief) */
    .redirect-message {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #ff69b4cc;
 backdrop-filter: blur(12px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      flex-direction: column;
      gap: 1rem;
      color: white;
      font-size: 1.5rem;
      font-weight: 600;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255,255,240,0.3);
      border-top: 5px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 550px) {
      .time-block {
        min-width: 65px;
        padding: 0.5rem 0.2rem;
      }
      .timer-container {
        gap: 0.7rem;
      }
      .countdown-card {
        padding: 1.5rem 1rem;
      }
      .countdown-title {
        font-size: 1.4rem;
      }
    }

    @media (max-width: 420px) {
      .time-block {
        min-width: 55px;
      }
      .time-number {
        font-size: 1.8rem;
      }
      .timer-container {
        gap: 0.5rem;
      }
    }
  </style>
</head>
<body>

  <!-- ========== COUNTDOWN BLOCKER (visible until target datetime) ========== -->
  <div id="countdownOverlay" class="countdown-wrapper">
    <div class="countdown-card">
      <div class="countdown-title">🌸 Merin Birthday Countdown 🌸</div>
      <div class="countdown-sub">Merin's birthday is on April 22, 12:00 AM</div>

      <div class="timer-container" id="timerContainer">
        <div class="time-block">
          <div class="time-number" id="days">00</div>
          <div class="time-label">Days</div>
        </div>
        <div class="time-block">
          <div class="time-number" id="hours">00</div>
          <div class="time-label">Hours</div>
        </div>
        <div class="time-block">
          <div class="time-number" id="minutes">00</div>
          <div class="time-label">Minutes</div>
        </div>
        <div class="time-block">
          <div class="time-number" id="seconds">00</div>
          <div class="time-label">Seconds</div>
        </div>
      </div>

      <div class="countdown-message">✨ Get ready for Merin's birthday!! ✨</div>
      <div class="launch-note">🎀 Target: April 22, 00:00 (local device timezone) 🎀</div>
    </div>
  </div>

  <!-- brief redirect loader (only appears during navigation) -->
  <div id="redirectLoader" class="redirect-message">
    <div class="spinner"></div>
    <div>✨ Launching your website... ✨</div>
  </div>

  <script>
    (function() {
      // ============================================================
      // CONFIGURATION: 
      // Target date: April 22, 2026, 12:00 AM (local time)
      // After countdown ends: load and display "main.html" from local directory
      // NO extra demo content — only the countdown and then main.html
      // ============================================================
      const TARGET_YEAR = 2026;
      const TARGET_MONTH = 3;      // April = 3 (0-index)
      const TARGET_DAY = 21;
      const TARGET_HOUR = 0;
      const TARGET_MINUTE = 0;
      const TARGET_SECOND = 0;
      
      // Build target date using LOCAL timezone (user's system clock)
      const targetDate = new Date(TARGET_YEAR, TARGET_MONTH, TARGET_DAY, TARGET_HOUR, TARGET_MINUTE, TARGET_SECOND, 0);
      
      // DOM elements
      const overlayEl = document.getElementById('countdownOverlay');
      const redirectLoader = document.getElementById('redirectLoader');
      
      // Helper: format numbers with leading zeros
      function formatTimeUnit(value) {
        return value < 10 ? '0' + value : value.toString();
      }
      
      // Function to update the countdown UI
      function updateCountdownUI(remainingMs) {
        if (remainingMs <= 0) return;
        
        const totalSeconds = Math.floor(remainingMs / 1000);
        const days = Math.floor(totalSeconds / 86400);
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        
        const daysSpan = document.getElementById('days');
        const hoursSpan = document.getElementById('hours');
        const minutesSpan = document.getElementById('minutes');
        const secondsSpan = document.getElementById('seconds');
        
        if (daysSpan) daysSpan.innerText = formatTimeUnit(days);
        if (hoursSpan) hoursSpan.innerText = formatTimeUnit(hours);
        if (minutesSpan) minutesSpan.innerText = formatTimeUnit(minutes);
        if (secondsSpan) secondsSpan.innerText = formatTimeUnit(seconds);
      }
      
      // Function to perform the actual launch: hide countdown, load main.html
      // This completely replaces the view with your local main.html file
      let launchExecuted = false;   // prevent multiple launches
      
      function launchMainWebsite() {
        if (launchExecuted) return;
        launchExecuted = true;
        
        // Clear any running countdown interval
        if (window.countdownInterval) {
          clearInterval(window.countdownInterval);
          window.countdownInterval = null;
        }
        
        // Show a brief loading indicator (optional but elegant)
        if (redirectLoader) {
          redirectLoader.style.display = 'flex';
        }
        
        // Small delay to allow loader to show, then redirect to main.html
        // Using setTimeout to ensure smooth transition and avoid flicker
        setTimeout(function() {
          // METHOD 1: Use fetch to load main.html and replace entire document content
          // This ensures we show the actual main.html content without iframe issues
          // and fully replaces the countdown page.
          fetch('main.html')
            .then(response => {
              if (!response.ok) {
                throw new Error(`Could not load main.html: ${response.status} ${response.statusText}`);
              }
              return response.text();
            })
            .then(htmlContent => {
              // Hide loader
              if (redirectLoader) redirectLoader.style.display = 'none';
              
              // Replace entire document with the loaded main.html content
              // This preserves the URL but completely changes the page content
              document.open();
              document.write(htmlContent);
              document.close();
              
              // Also ensure any leftover styles/overlays are gone (clean slate)
              // The new document will have its own styles and structure.
            })
            .catch(error => {
              console.error('Error loading main.html:', error);
              // Fallback: if fetch fails, try to redirect via window.location
              // In case file exists but fetch blocked due to CORS? Usually local file works fine.
              if (redirectLoader) redirectLoader.style.display = 'none';
              
              // Alternative approach: try to navigate directly to main.html
              // This changes the URL, but ensures the file loads.
              window.location.href = 'main.html';
            });
        }, 80); // tiny delay for smooth loader appearance
      }
      
      // Check if target time has been reached and launch if needed
      function checkAndLaunch() {
        const now = new Date();
        if (now.getTime() >= targetDate.getTime()) {
          if (!launchExecuted) {
            launchMainWebsite();
          }
          return true;
        }
        return false;
      }
      
      // Update countdown and check launch condition each second
      function updateCountdown() {
        const now = new Date();
        let remainingMs = targetDate.getTime() - now.getTime();
        
        if (remainingMs <= 0) {
          // Time has been reached or passed
          if (!launchExecuted) {
            launchMainWebsite();
          }
          return;
        }
        
        // Otherwise update the timer display
        updateCountdownUI(remainingMs);
      }
      
      // Initial check: if already passed target date (e.g., after 22 April 2026)
      const alreadyLaunched = checkAndLaunch();
      
      if (!alreadyLaunched) {
        // First manual update to set initial timer values
        updateCountdown();
        
        // Set up interval to refresh countdown every second
        window.countdownInterval = setInterval(() => {
          const now = new Date();
          if (now.getTime() >= targetDate.getTime()) {
            // Time reached, launch if not already
            if (!launchExecuted) {
              launchMainWebsite();
            }
            if (window.countdownInterval) {
              clearInterval(window.countdownInterval);
              window.countdownInterval = null;
            }
          } else {
            // Update remaining time
            const remaining = targetDate.getTime() - now.getTime();
            updateCountdownUI(remaining);
          }
        }, 1000);
      }
      
      // Extra robustness: when the page becomes visible again (user switches tabs)
      // re-check launch condition and ensure countdown is accurate.
      window.addEventListener('focus', function() {
        const now = new Date();
        if (now.getTime() >= targetDate.getTime()) {
          if (!launchExecuted) {
            launchMainWebsite();
          }
          if (window.countdownInterval) {
            clearInterval(window.countdownInterval);
            window.countdownInterval = null;
          }
        } else {
          // If interval died but not launched, restart interval
          if (window.countdownInterval === null && !launchExecuted) {
            updateCountdown(); // sync display
            window.countdownInterval = setInterval(() => {
              const nowFocus = new Date();
              if (nowFocus.getTime() >= targetDate.getTime()) {
                if (!launchExecuted) launchMainWebsite();
                if (window.countdownInterval) clearInterval(window.countdownInterval);
              } else {
                const remaining = targetDate.getTime() - nowFocus.getTime();
                updateCountdownUI(remaining);
              }
            }, 1000);
          } else {
            // just update display to fix any drift
            const nowSync = new Date();
            if (nowSync.getTime() < targetDate.getTime()) {
              const remainingSync = targetDate.getTime() - nowSync.getTime();
              updateCountdownUI(remainingSync);
            }
          }
        }
      });
      
      // Final safety: also on page load, check again after a short delay to avoid race conditions
      setTimeout(() => {
        const nowDelayed = new Date();
        if (nowDelayed.getTime() >= targetDate.getTime() && !launchExecuted) {
          launchMainWebsite();
        } else if (!launchExecuted && overlayEl) {
          // Ensure overlay is visible and countdown numbers are correct
          const remainingCheck = targetDate.getTime() - nowDelayed.getTime();
          if (remainingCheck > 0) {
            updateCountdownUI(remainingCheck);
          }
        }
      }, 300);
      
      // Listen for orientation change or resize (just to keep centering; no extra side effects)
      window.addEventListener('resize', function() {
        if (!launchExecuted && overlayEl && window.countdownInterval === null && new Date().getTime() < targetDate.getTime()) {
          // restart interval if missing
          updateCountdown();
          if (!window.countdownInterval) {
            window.countdownInterval = setInterval(() => {
              const nowResize = new Date();
              if (nowResize.getTime() >= targetDate.getTime()) {
                if (!launchExecuted) launchMainWebsite();
                if (window.countdownInterval) clearInterval(window.countdownInterval);
              } else {
                const remaining = targetDate.getTime() - nowResize.getTime();
                updateCountdownUI(remaining);
              }
            }, 1000);
          }
        }
      });
      
      // ========== HELPFUL NOTE ==========
      // This page is designed to ONLY show the countdown until April 22, 00:00 (local time).
      // After the countdown ends, it automatically fetches and displays "main.html" 
      // from the same directory as this file. Make sure "main.html" exists next to this file.
      // 
      // If you want to test before the target date, you can temporarily change TARGET_YEAR/MONTH/DAY
      // in the code above (e.g., set to current date minus 1 day). For production, keep as 2026/4/22.
      // The page is fully responsive on all mobile devices and respects the local timezone.
      // ==================================
      
      // Optional: add a small console message for developers (can be removed)
      console.log('🌸 Pink Countdown Active | Target: ' + targetDate.toString() + ' | Will load main.html after countdown.');
    })();
  </script>
</body>
</html>
